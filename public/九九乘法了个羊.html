<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>九九乘法了个羊 - 终极丝滑版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0; padding: 0; 
            background-color: #f0fdf4; 
            overscroll-behavior: none; touch-action: none;
            font-family: 'Nunito', ui-rounded, 'Hiragino Maru Gothic ProN', system-ui, sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-error-shake { animation: errorShake 0.3s ease-in-out; }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .particle {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 10001;
            animation: explode 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* =========================================
           卡牌底板 (立体白瓷质感)
           ========================================= */
        .tile-base {
            background-color: #ffffff; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1; 
            border-bottom: 4px solid #94a3b8; 
            display: flex;
            align-items: center; 
            justify-content: center;
            transition: transform 0.08s ease, border-bottom-width 0.08s ease, box-shadow 0.2s;
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 3px 4px rgba(0, 0, 0, 0.05); 
            font-weight: 900;
        }

        .cursor-pointer:active { 
            border-bottom-width: 1px !important; 
            transform: translateY(3px) scale(0.98) !important; 
        }

        /* 字号与留白 */
        .num-base { z-index: 10; position: relative; }
        .text-uniform { font-size: 22px; letter-spacing: 0px; } 
        .slot-uniform { font-size: 20px; letter-spacing: 0px; }

        /* 同色系明暗排版 */
        .tier-B .num-base { color: #526e65; }
        .tier-A .num-base { color: #059669; }
        .tier-S .num-base { color: #0d9488; }
        .tier-SS .num-base { color: #4d7c0f; }
        .tier-C .num-base { color: #022c22; }
        
        .tier-SSS { background-color: #ecfdf5; border-color: #a7f3d0; border-bottom-color: #6ee7b7;}
        .tier-SSS .num-base { color: #059669; }

        /* =========================================
           ✨ 修复视觉：能点与不能点 (彻底解决发光和扁平问题)
           ========================================= */
        .card-covered {
            pointer-events: none; 
            /* 弃用内部蒙版和扁平化，直接使用全局滤镜：降低亮度、降低饱和度，完美保留物理厚度和边框颜色比例 */
            filter: brightness(0.6) saturate(0.3) contrast(0.9) !important; 
            transform: translateY(1px); /* 极其细微的视觉下沉感 */
        }
        /* 去除伪元素覆盖 */
        .card-covered::after { display: none; }

        /* --- 沉浸式木纹卡槽 --- */
        #slot-area {
            background-color: #2f4f4f; 
            background-image: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0,0,0,0.1) 15px, rgba(0,0,0,0.1) 30px);
            border-radius: 16px; 
            border: 4px solid #1a3622;
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.1); 
            transition: all 0.3s;
            padding: 10px 10px; 
            height: 22vw; max-height: 90px;
        }
        .slot-placeholder { background-color: rgba(0,0,0,0.35); border-radius: 6px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.4); border: 1px dashed rgba(255,255,255,0.15);}

        @keyframes dangerFlash {
            0%, 100% { border-color: #1a3622; box-shadow: inset 0 8px 16px rgba(0,0,0,0.5); }
            50% { border-color: #ef4444; box-shadow: inset 0 4px 8px rgba(0,0,0,0.4), 0 0 30px rgba(239, 68, 68, 0.8); }
        }
        .danger-warning { animation: dangerFlash 1s infinite; }

        /* 浮动特效 */
        @keyframes equationFlyUp {
            0% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
            80% { transform: translateX(-50%) translateY(-35px) scale(1.1); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-50px) scale(1); opacity: 0; }
        }
        .equation-overlay {
            position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 10002; 
            pointer-events: none; white-space: nowrap;
            background: rgba(255, 255, 255, 0.95); padding: 8px 16px 6px 16px; 
            border-radius: 20px; backdrop-filter: blur(8px); 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0,0,0,0.05);
        }
        .equation-overlay.floating { animation: equationFlyUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .math-sign { font-size: 20px; font-weight: 900; color: #94a3b8; margin: 0 4px; }
        .equation-mnemonic { margin-top: 4px; color: #10b981; font-size: 15px; font-weight: 900; letter-spacing: 1px; }
        .eq-card { position: relative; z-index: 10003; }

        @keyframes scoreFloat {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -25px) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
        }
        .score-float {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            color: #10b981; font-weight: 900; font-size: 26px; text-shadow: 0 3px 0 #fff;
            z-index: 10000; pointer-events: none; display: flex; flex-direction: column; align-items: center; line-height: 1.1;
        }
        .combo-text { color: #f59e0b; font-size: 14px; font-style: italic; }
    </style>
</head>

    <script>
        const MULTIPLICATION_PAIRS = [];
        const ALL_NUMBERS = new Set();
        for (let i = 1; i <= 9; i++) {
            for (let j = i; j <= 9; j++) {
                MULTIPLICATION_PAIRS.push([i, j, i * j]);
                ALL_NUMBERS.add(i); ALL_NUMBERS.add(j); ALL_NUMBERS.add(i * j);
            }
        }
        const UNIQUE_NUMBERS = Array.from(ALL_NUMBERS).sort((a, b) => a - b);
        
        const getTier = (val) => {
            if (val === '万能' || val === '洗牌') return 'SSS';
            if ([4, 6, 8, 9].includes(val)) return 'SS';
            if ([1, 2, 3, 5, 7].includes(val)) return 'S';
            if ([12, 16, 18, 24, 36].includes(val)) return 'A';
            if ([25, 49, 64, 81].includes(val)) return 'C';
            return 'B';
        };

        const iconSparkles = `<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>`;
        const iconShuffle = `<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>`;

        let cards = [], slot = [];
        let unlockedCards = new Set();
        let currentLevel = 1;
        let timeElapsed = 0, timerInterval = null, flyingCardsCount = 0, matchCounter = 0;
        let currentScore = 0, comboMultiplier = 0, lastMatchTime = 0, maxComboReached = 0;
        let isProcessingMatch = false; 
        let equationTimes = {}; 
        let currentMatchStartTime = Date.now();

        // 道具库状态
        let wildcardCount = 0;
        let shuffleCount = 0;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.body.addEventListener('pointerdown', initAudio, { once: true });

        function playMildWarningBeep() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function playSuccessChime() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function createExplosion(x, y) {
            for(let i = 0; i < 15; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.width = (Math.random() * 8 + 4) + 'px'; 
                p.style.height = p.style.width;
                p.style.background = ['#059669', '#4d7c0f', '#0d9488', '#022c22'][Math.floor(Math.random()*4)];
                p.style.left = x + 'px'; p.style.top = y + 'px';
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 50 + 30;
                p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function getKouJue(a, b, c) {
            const nums = [a, b].sort((x, y) => x - y);
            const zh = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
            let strC = c < 10 ? '得' + zh[c] : (Math.floor(c / 10) === 1 ? '十' : zh[Math.floor(c / 10)] + '十') + (c % 10 === 0 ? '' : zh[c % 10]);
            return `${zh[nums[0]]}${zh[nums[1]]}${strC}`;
        }

        // ✨ 核心修复：宽容碰撞检测 (Hitbox Shrink)
        // 允许卡牌边缘被微微碰到但不被判定为遮盖，手感更顺滑
        function checkOverlap(a, b) {
            const hitX = 0.05; // 容错率：X轴收缩 15%
            const hitY = 0.05; // 容错率：Y轴收缩 15%
            
            const aLeft = a.x + hitX, aRight = a.x + 1.0 - hitX;
            const aTop = a.y + hitY, aBottom = a.y + 1.3 - hitY;
            const bLeft = b.x + hitX, bRight = b.x + 1.0 - hitX;
            const bTop = b.y + hitY, bBottom = b.y + 1.3 - hitY;
            
            return (aLeft < bRight && aRight > bLeft && aTop < bBottom && aBottom > bTop);
        }

        function checkCovered(cardList) {
            cardList.forEach(c => c.isCovered = false);
            for (let i = 0; i < cardList.length; i++) {
                for (let j = 0; j < cardList.length; j++) {
                    if (i === j) continue;
                    const a = cardList[i], b = cardList[j];
                    const isRenderedOnTop = (b.z > a.z) || (b.z === a.z && j > i);
                    if (isRenderedOnTop && checkOverlap(a, b)) { 
                        a.isCovered = true; 
                        break; 
                    }
                }
            }
            return cardList;
        }

        function generateLevel(level) {
            let layoutNodes = [], idCounter = 0, layers = [], pairsCount = 0, toolsList = [];

            if (level === 1) {
                layers = [ { z: 0, count: 5, xRange: [1.5, 5.5], yRange: [2.5, 5.5] }, { z: 1, count: 4, xRange: [2.0, 5.0], yRange: [3.0, 5.0] } ];
                pairsCount = 3;
            } else {
                layers = [ 
                    { z: 0, count: 42, xRange: [0.0, 7.5], yRange: [0.0, 8.5] }, 
                    { z: 1, count: 36, xRange: [0.3, 7.2], yRange: [0.3, 8.2] }, 
                    { z: 2, count: 30, xRange: [0.6, 6.9], yRange: [0.6, 7.9] }, 
                    { z: 3, count: 22, xRange: [1.0, 6.5], yRange: [1.0, 7.5] }, 
                    { z: 4, count: 14, xRange: [1.5, 6.0], yRange: [1.5, 7.0] }, 
                    { z: 5, count: 8,  xRange: [2.0, 5.5], yRange: [2.0, 6.5] } 
                ];
                pairsCount = 50; toolsList = ['万能', '洗牌']; 
            }

            layers.forEach(layer => {
                for (let i = 0; i < layer.count; i++) { layoutNodes.push({ id: `n_${idCounter++}`, x: layer.xRange[0] + Math.random() * (layer.xRange[1] - layer.xRange[0]), y: layer.yRange[0] + Math.random() * (layer.yRange[1] - layer.yRange[0]), z: layer.z, coveredByCount: 0, coversIds: [], assignedValue: null, type: null, tier: null }); }
            });

            // 同样应用宽容碰撞箱构建依赖关系
            for (let i = 0; i < layoutNodes.length; i++) {
                for (let j = i + 1; j < layoutNodes.length; j++) {
                    let a = layoutNodes[i], b = layoutNodes[j]; let bottom = a.z <= b.z ? a : b; let top = a.z > b.z ? a : b;
                    if (checkOverlap(bottom, top)) { bottom.coveredByCount++; top.coversIds.push(bottom.id); }
                }
            }

            let maxRetries = 20;
            let finalNodes = [];

            for (let attempt = 0; attempt < maxRetries; attempt++) {
                let inDegree = {};
                layoutNodes.forEach(n => { n.assignedValue = null; n.type = null; n.tier = null; inDegree[n.id] = n.coveredByCount; });

                let remainingNodes = new Set(layoutNodes);
                let actionPools = [];
                for (let i = 0; i < pairsCount; i++) actionPools.push({ type: 'pair', data: MULTIPLICATION_PAIRS[Math.floor(Math.random() * MULTIPLICATION_PAIRS.length)] });
                toolsList.forEach(tool => actionPools.push({ type: 'tool', data: tool }));
                actionPools.sort(() => Math.random() - 0.5);

                let attemptFailed = false;

                for (let action of actionPools) {
                    let available = Array.from(remainingNodes).filter(n => inDegree[n.id] === 0);

                    if (action.type === 'pair') {
                        if (available.length < 3) { attemptFailed = true; break; }
                        let picked = [];
                        for(let i=0; i<3; i++) {
                            let idx = Math.floor(Math.random() * available.length);
                            picked.push(available[idx]); available.splice(idx, 1);
                        }
                        let nums = [action.data[0], action.data[1], action.data[2]].sort(() => Math.random() - 0.5);
                        picked[0].assignedValue = nums[0]; picked[0].type = 'number'; picked[0].tier = getTier(nums[0]);
                        picked[1].assignedValue = nums[1]; picked[1].type = 'number'; picked[1].tier = getTier(nums[1]);
                        picked[2].assignedValue = nums[2]; picked[2].type = 'number'; picked[2].tier = getTier(nums[2]);

                        picked.forEach(n => { remainingNodes.delete(n); n.coversIds.forEach(coveredId => { inDegree[coveredId]--; }); });
                    } else if (action.type === 'tool') {
                        if (available.length < 1) { attemptFailed = true; break; }
                        let idx = Math.floor(Math.random() * available.length);
                        let pickedNode = available[idx];
                        pickedNode.assignedValue = action.data; pickedNode.type = 'tool'; pickedNode.tier = 'SSS';
                        remainingNodes.delete(pickedNode); pickedNode.coversIds.forEach(coveredId => { inDegree[coveredId]--; });
                    }
                }

                if (!attemptFailed && remainingNodes.size === 0) {
                    console.log(`🧠 完美解局生成成功！耗费算法尝试次数：${attempt + 1}`);
                    finalNodes = layoutNodes;
                    break;
                }
            }

            if (finalNodes.length === 0) {
                console.warn("未能生成解，降级为随机发牌");
                finalNodes = layoutNodes;
                let fallbackPool = [];
                for (let i = 0; i < pairsCount; i++) {
                    let pair = MULTIPLICATION_PAIRS[Math.floor(Math.random() * MULTIPLICATION_PAIRS.length)];
                    fallbackPool.push(pair[0], pair[1], pair[2]);
                }
                toolsList.forEach(t => fallbackPool.push(t));
                fallbackPool.sort(() => Math.random() - 0.5); 
                finalNodes.forEach((n, i) => { 
                    let val = fallbackPool[i] || 2; 
                    n.assignedValue = val; 
                    n.type = typeof val === 'number' ? 'number' : 'tool'; 
                    n.tier = getTier(val); 
                });
            }

            return checkCovered(finalNodes.map(n => ({ id: n.id, value: n.assignedValue, tier: n.tier, type: n.type, x: n.x, y: n.y, z: n.z, isCovered: false })));
        }

        function handleCardClick(id, element) {

        function checkMatch() {
            if (slot.length < 3) { checkWin(); return; } 
            const nums = slot.map(c => c.value); let matchedIndices = null, matchedA, matchedB, matchedC;
            
            for (let i = 0; i < nums.length; i++) {
                for (let j = i + 1; j < nums.length; j++) {
                    for (let k = j + 1; k < nums.length; k++) {
                        const a = nums[i], b = nums[j], c = nums[k];
                        if (a * b === c && a <= 9 && b <= 9) { matchedIndices = [i, j, k]; matchedA = Math.min(a,b); matchedB = Math.max(a,b); matchedC = c; break; }
                        if (a * c === b && a <= 9 && c <= 9) { matchedIndices = [i, j, k]; matchedA = Math.min(a,c); matchedB = Math.max(a,c); matchedC = b; break; }
                        if (b * c === a && b <= 9 && c <= 9) { matchedIndices = [i, j, k]; matchedA = Math.min(b,c); matchedB = Math.max(b,c); matchedC = a; break; }
                    }
                    if (matchedIndices) break;
                }
                if (matchedIndices) break;
            }

                currentMatchStartTime = Date.now();

                if (now - lastMatchTime < 5000 && lastMatchTime !== 0) { comboMultiplier++; } else { comboMultiplier = 1; }
                lastMatchTime = now; if(comboMultiplier > maxComboReached) maxComboReached = comboMultiplier;

                const tier = getTier(matchedC); let baseScore = tier === 'C' ? 300 : tier === 'B' ? 150 : tier === 'A' ? 100 : 50; if (tier === 'SSS') baseScore = 10; 
                const earnedScore = baseScore * comboMultiplier; currentScore += earnedScore;

                const getIdxForVal = (val) => { for (let i = 0; i < remainingIndices.length; i++) { if (slot[remainingIndices[i]].value === val) return remainingIndices.splice(i, 1)[0]; } return remainingIndices.pop(); };
                const orderedIndices = [getIdxForVal(matchedA), getIdxForVal(matchedB), getIdxForVal(matchedC)];
                const startRects = orderedIndices.map(idx => slotElements[idx].getBoundingClientRect()); const matchedValues = orderedIndices.map(idx => slot[idx].value);

                };

                icon.innerHTML = `🫠`; title.innerText = "卡槽已满"; scoreArea.classList.add('hidden'); gradeEl.classList.add('hidden');
                let stuckNumbers = [...new Set(slot.map(c => c.value))]; let stuckStr = stuckNumbers.slice(0, 3).join('、');
                let descText = `<span class='text-slate-600 text-base'>卡槽满了哦！<br>残留了 <b>${stuckStr}</b>，注意规划抓牌顺序！<br><span class="text-emerald-600 text-xs mt-1 block">💡 提示：如果收集了小道具，卡死前记得使用！</span></span>`;
                
                if (hardestEq && maxTime > 2000) { descText += `<span class="text-rose-500 mt-3 block bg-rose-50 p-2 rounded-lg border border-rose-100 text-sm">【易错点拨】你在 <b>${hardestEq}</b> 上思考了最久，不要灰心！</span>`; }
                desc.innerHTML = descText;

                btn.innerText = "再试一次"; btn.className = "w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-black text-xl shadow-sm active:scale-95 transition-all mt-4"; btn.onclick = () => initGame(true, 1);
            }
        }

        function toggleBook(show) {
            const book = document.getElementById('book-modal');
            if (show) { renderBookContent(); book.classList.remove('hidden'); setTimeout(() => book.classList.remove('translate-y-full'), 10); } 
            else { book.classList.add('translate-y-full'); setTimeout(() => book.classList.add('hidden'), 300); }
        }

        function renderBookContent() {
            const content = document.getElementById('book-content');
            let html = `
                <div class="bg-emerald-50 text-emerald-800 p-4 rounded-2xl text-sm mb-6 font-medium border border-emerald-100 flex items-start space-x-2">
                    <span>💡</span><span>提示：在游戏中成功消除卡牌，即可解锁对应的图鉴！</span>
                </div>
            `;
            
            html += `<div><h3 class="font-black text-[#2c3e50] mb-4 text-lg">典藏道具</h3><div class="flex space-x-4">`;
            ['万能', '洗牌'].forEach(tool => {
                const isUnlocked = unlockedCards.has(tool);
                const activeClass = isUnlocked ? `tier-SSS` : `bg-[#f8fafc] border border-slate-100 rounded-[14px] shadow-none opacity-40 grayscale`;
                html += `
                <div class="flex flex-col items-center">
                    <div class="w-[18vw] max-w-[70px] aspect-square flex flex-col items-center justify-center mb-2 tile-base ${activeClass}">
                        <div class="w-8 h-8 z-10 relative num-base">${tool === '万能' ? iconSparkles : iconShuffle}</div>
                    </div>
                    <span class="text-sm font-black text-[#7f8c8d]">${tool}卡</span>
                </div>`;
            });
            html += `</div></div>`;

            const tiers = [
                { id: 'SS', title: 'SS级 暖阳绿 (核心合数)', desc: '既能作因数又能作乘积，枢纽因数！' },
                { id: 'S', title: 'S级 湖水碧 (质数与1)', desc: '纯粹底层因数，合成其他数字的根基！' },
                { id: 'A', title: 'A级 翡翠绿 (高频乘积)', desc: '拥有多种分解方式，牌局润滑剂！' },
                { id: 'B', title: 'B级 灰苍绿 (常规乘积)', desc: '安静退居背景的常规数字！' },
                { id: 'C', title: 'C级 幽林暗绿 (平方数)', desc: '必须抽到两张相同的因数才能消除，极易卡手！' }
            ];

            tiers.forEach(tier => {
                const nums = UNIQUE_NUMBERS.filter(n => getTier(n) === tier.id);
                if (nums.length === 0) return;
                html += `<div class="mt-8"><h3 class="font-black text-[#2c3e50] mb-1 text-lg">${tier.title}</h3>`;
                html += `<p class="text-xs text-slate-500 mb-4 font-bold">${tier.desc}</p>`;
                html += `<div class="grid grid-cols-4 gap-3">`;
                nums.forEach(num => {
                    const isUnlocked = unlockedCards.has(num);
                    const activeClass = isUnlocked ? `tier-${tier.id}` : `bg-[#f8fafc] border border-slate-100 rounded-[12px] shadow-none opacity-40 grayscale`;
                    
                    html += `<div class="aspect-[3/4] flex flex-col items-center justify-center font-black tile-base ${activeClass}">`;
                    html += `<span class="num-base text-uniform">${isUnlocked ? num : '?'}</span>`;
                    html += `</div>`;
                });
                html += `</div></div>`;
            });
            content.innerHTML = html;
        }

        initGame(true, 1);
    </script>
</body>
</html>
