<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自适应诊断 · 五年级数学</title>
    <style>
        :root {
            --bg-dark:#0d1117;--panel-dark:#161b22;--border-dark:#30363d;
            --text-dark-main:#c9d1d9;--text-dark-sub:#8b949e;
            --primary:#3b82f6;--primary-light:#eff6ff;--ai-color:#10b981;--ai-light:#ecfdf5;
            --accent:#8b5cf6;--danger:#ef4444;--warning:#f59e0b;--success:#10b981;
            --bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;
            --text:#1e293b;--text-sub:#64748b;--text-muted:#94a3b8;--radius:16px;
        }
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"SF Pro Display","PingFang SC",sans-serif}
        body{display:flex;height:100vh;overflow:hidden;background:var(--bg-dark)}

        /* ===== 左侧监控台 ===== */
        .backend-panel{width:38%;background:var(--panel-dark);border-right:1px solid var(--border-dark);display:flex;flex-direction:column;padding:20px;overflow:hidden}
        .backend-header{margin-bottom:16px;flex-shrink:0}
        .backend-header h2{font-size:1.1rem;color:var(--text-dark-main);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:10px}
        .tags-group{display:flex;gap:8px;flex-wrap:wrap}
        .tag{background:#21262d;border:1px solid var(--border-dark);padding:3px 10px;border-radius:16px;font-size:.75rem;color:#58a6ff;font-weight:500;transition:all .3s}
        .tag.ui-tag{color:#3fb950}.tag.phase-tag{color:#f0883e}
        .tag.updated{animation:tagPulse .6s ease}
        @keyframes tagPulse{0%{transform:scale(1)}50%{transform:scale(1.08);box-shadow:0 0 8px rgba(88,166,255,.4)}100%{transform:scale(1)}}
        .ide-window{flex:1;background:#010409;border:1px solid var(--border-dark);border-radius:10px;padding:16px;overflow-y:auto;font-family:'JetBrains Mono','Courier New',monospace;font-size:.78rem;line-height:1.55;box-shadow:inset 0 2px 8px rgba(0,0,0,.5);position:relative;min-height:0}
        .ide-window::before{content:attr(data-filename);position:absolute;top:0;left:0;background:var(--border-dark);color:var(--text-dark-sub);font-size:.65rem;padding:3px 10px;border-bottom-right-radius:6px}
        .json-key{color:#79c0ff}.json-string{color:#a5d6ff}.json-number{color:#ff7b72}.json-boolean{color:#ff7b72}.json-null{color:#8b949e}
        .strategy-card{margin-top:14px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);padding:14px;border-radius:10px;flex-shrink:0;transition:all .3s}
        .strategy-card.updated{animation:cardGlow .8s ease}
        @keyframes cardGlow{0%{box-shadow:none}50%{box-shadow:0 0 12px rgba(139,92,246,.4)}100%{box-shadow:none}}
        .strategy-card h3{font-size:.85rem;color:#b392f0;margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .strategy-card p{font-size:.8rem;color:var(--text-dark-sub);line-height:1.5}
        .kg-section{margin-top:12px;flex-shrink:0}
        .kg-section h3{font-size:.8rem;color:var(--text-dark-sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .kg-breadcrumb{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:8px}
        .kg-crumb{font-size:.7rem;padding:2px 8px;border-radius:4px;font-weight:600}
        .kg-crumb.l1{background:rgba(59,130,246,.15);color:#58a6ff}
        .kg-crumb.l2{background:rgba(139,92,246,.15);color:#b392f0}
        .kg-crumb.l3{background:rgba(16,185,129,.15);color:#3fb950}
        .kg-crumb.l4{background:rgba(245,158,11,.15);color:#f0883e}
        .kg-arrow{color:var(--text-dark-sub);font-size:.65rem}
        .kg-dep-label{font-size:.65rem;color:var(--text-dark-sub);margin-bottom:4px}
        .kg-dep-list{display:flex;flex-wrap:wrap;gap:4px}
        .kg-dep-tag{font-size:.65rem;padding:1px 6px;border-radius:3px;background:#21262d;border:1px solid var(--border-dark);color:var(--text-dark-sub)}
        .kg-dep-tag.pre{border-color:rgba(59,130,246,.3);color:#58a6ff}
        .kg-dep-tag.post{border-color:rgba(16,185,129,.3);color:#3fb950}
        .idea-section{margin-top:10px;flex-shrink:0}
        .idea-section h3{font-size:.8rem;color:var(--text-dark-sub);margin-bottom:6px}
        .idea-chip{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;padding:3px 8px;border-radius:12px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);color:#b392f0;margin:2px;font-weight:500}
        .idea-chip .idea-id{opacity:.7;font-size:.6rem}
        .idea-cross{font-size:.65rem;color:var(--text-dark-sub);margin-top:4px;line-height:1.4;padding-left:4px;border-left:2px solid rgba(139,92,246,.3)}
        .diag-timeline{margin-top:14px;flex-shrink:0;max-height:160px;overflow-y:auto}
        .diag-timeline h3{font-size:.8rem;color:var(--text-dark-sub);margin-bottom:8px}
        .tl-item{display:flex;gap:8px;margin-bottom:8px;font-size:.75rem;color:var(--text-dark-sub);animation:fadeIn .3s ease}
        .tl-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
        .tl-dot.wait{background:#484f58}.tl-dot.pass{background:#3fb950}.tl-dot.fail{background:#f85149}.tl-dot.info{background:#58a6ff}
        .tl-text b{color:var(--text-dark-main)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

        /* ===== 右侧：三区课堂布局 ===== */
        .frontend-panel{width:62%;background:#f7f7f7;display:flex;flex-direction:column;position:relative;height:100vh;overflow:hidden}
        .app-header{background:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05);flex-shrink:0;z-index:10}
        .app-title{font-size:.95rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
        .app-title .badge{background:linear-gradient(135deg,var(--accent),var(--primary));color:white;font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
        .progress-dots{display:flex;gap:5px;align-items:center}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
        .dot.active{background:var(--primary);width:22px;border-radius:4px}.dot.done{background:var(--success)}

        /* --- 课件区（题干+板书 = 一页PPT） --- */
        .courseware-slide{flex-shrink:0;max-height:50%;overflow-y:auto;background:white;margin:10px 12px 0;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid #e8e8e8;display:flex;flex-direction:column}
        /* 题干区 */
        .question-zone{flex-shrink:0;background:transparent;border-bottom:none}
        .question-zone:empty{display:none}
        .question-zone .question-card{margin:0;padding:16px 20px 12px;border-radius:0;border-left:none;box-shadow:none;background:transparent}
        .question-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
        .question-header .qh-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),#2563eb);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:white;flex-shrink:0}
        .question-header .qh-title{font-size:.85rem;font-weight:700;color:var(--text)}
        .question-header .qh-badge{font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:10px;background:#f0f5ff;color:var(--primary);margin-left:auto;flex-shrink:0}
        .question-label{display:none}
        .question-text{font-size:.95rem;line-height:1.8;color:var(--text);padding:0}
        .question-text b{color:var(--primary);font-weight:700}
        /* 板书区（课件下半部分，初始空白占位） */
        .board-zone{flex:1;flex-shrink:0;overflow:hidden;border-top:1px dashed #e8e8e8;background:#fafffe;min-height:80px}
        .board-zone:empty{min-height:80px;background:#fafffe}
        .board-zone .board-header{padding:8px 14px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-bottom:1px solid #dcfce7;font-size:.75rem;color:var(--ai-color);font-weight:700;display:flex;align-items:center;gap:6px}
        .board-split{display:flex;gap:0;min-height:120px}
        /* 左列：动画+关键提醒 */
        .board-left{flex:0 0 42%;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;background:#fafffe}
        .board-left .key-hint{margin-top:10px;font-size:.8rem;color:var(--ai-color);font-weight:600;text-align:center;padding:6px 10px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;animation:fadeIn .5s ease}
        /* 右列：标准步骤 */
        .board-right{flex:1;padding:14px;overflow-y:auto;max-height:220px}
        .board-step{margin-bottom:8px;opacity:0;transform:translateX(-10px);animation:boardStepIn .5s ease forwards;font-size:.88rem;line-height:1.7;color:var(--text)}
        .board-step .step-num{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--primary);color:white;font-size:.7rem;font-weight:700;text-align:center;line-height:22px;margin-right:6px}
        .board-step .step-formula{display:inline-block;background:#eff6ff;padding:2px 10px;border-radius:6px;font-weight:700;color:var(--primary);font-family:'JetBrains Mono',monospace;margin:2px 0}
        .board-step .step-result{color:var(--ai-color);font-weight:700}
        @keyframes boardStepIn{to{opacity:1;transform:translateX(0)}}
        .board-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:6px 0}
        .board-conclusion{font-size:.85rem;color:var(--ai-color);font-weight:700;padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;opacity:0;animation:boardStepIn .5s ease forwards}
        /* 动画区（在左列内） */
        .visual-wrap{display:flex;justify-content:center;align-items:center;position:relative}
        .tank{width:130px;height:105px;border:3px solid #94a3b8;border-top:none;border-radius:0 0 10px 10px;background:rgba(248,250,252,.5);position:relative}
        .water{position:absolute;bottom:0;left:0;width:100%;background:rgba(56,189,248,.35);border-radius:0 0 7px 7px;transition:height 1.2s ease;display:flex;justify-content:center;align-items:flex-end;padding-bottom:8px}
        .stone{width:40px;height:30px;background:linear-gradient(135deg,#94a3b8,#475569);border-radius:14px 20px 10px 18px;box-shadow:inset -3px -3px 8px rgba(0,0,0,.3);transform:translateY(-70px);opacity:0;transition:all .8s ease}
        .stone.dropped{transform:translateY(0);opacity:1}
        .water.raised{background:rgba(56,189,248,.5);height:80px!important}
        .m-label{font-size:.65rem;font-weight:600;color:var(--text-sub);position:absolute;right:-55px;transition:opacity .5s}
        .m-label.l1{bottom:45px}.m-label.l2{bottom:78px;color:var(--primary);opacity:0}.m-label.l2.show{opacity:1}
        .delta-label{position:absolute;right:-65px;bottom:58px;font-size:.7rem;font-weight:700;color:var(--danger);opacity:0;transition:opacity .5s .5s;background:#fef2f2;padding:2px 5px;border-radius:4px}
        .delta-label.show{opacity:1}

        /* --- 对话互动区（微信风格） --- */
        .chat-zone{flex:1;overflow-y:auto;padding:10px 0;scroll-behavior:smooth;min-height:180px;background:#f7f7f7}
        .chat-section{padding:0 12px}
        .msg-row{display:flex;margin-bottom:14px;animation:slideUp .3s ease forwards;opacity:0;transform:translateY(6px);align-items:flex-start}
        @keyframes slideUp{to{opacity:1;transform:translateY(0)}}
        .msg-ai{justify-content:flex-start}.msg-stu{justify-content:flex-end}
        .avatar{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .msg-ai .avatar{background:linear-gradient(135deg,#10b981,#059669);margin-right:10px;color:white}
        .msg-stu .avatar{background:linear-gradient(135deg,var(--primary),#2563eb);margin-left:10px;color:white}
        .bubble-wrap{max-width:75%;position:relative}.msg-stu .bubble-wrap{display:flex;flex-direction:column;align-items:flex-end}
        .sender{font-size:.65rem;color:#999;margin-bottom:3px}
        .bubble{padding:10px 14px;border-radius:6px;font-size:.9rem;line-height:1.65;position:relative;word-break:break-word}
        .msg-ai .bubble{background:white;border:none;box-shadow:0 1px 2px rgba(0,0,0,.06)}
        .msg-ai .bubble::before{content:'';position:absolute;left:-6px;top:10px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:6px solid white}
        .msg-stu .bubble{background:#95ec69;color:#000;border:none}
        .msg-stu .bubble::before{content:'';position:absolute;right:-6px;top:10px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:6px solid #95ec69}
        .bubble.hint{background:#fffbeb}.bubble.success{background:#f0fdf4}.bubble.error-hint{background:#fef2f2}
        .msg-ai .bubble.hint::before{border-right-color:#fffbeb}.msg-ai .bubble.success::before{border-right-color:#f0fdf4}.msg-ai .bubble.error-hint::before{border-right-color:#fef2f2}

        /* === 原子题目区块（降维选择题） === */
        .scaffold-popup{margin:12px 0;background:white;border:2px solid #c7d2fe;border-radius:var(--radius);overflow:hidden;animation:fadeIn .4s ease;box-shadow:0 2px 8px rgba(139,92,246,.1)}
        .scaffold-popup::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--primary))}
        .scaffold-label{font-size:.7rem;font-weight:700;color:white;background:var(--accent);padding:6px 14px;display:flex;align-items:center;gap:5px}
        .scaffold-text{font-size:.9rem;line-height:1.7;color:var(--text);padding:12px 14px 8px;border-bottom:1px dashed #e0e7ff}
        .scaffold-text b{color:var(--primary);font-weight:700}
        .scaffold-choices{display:flex;flex-direction:column;gap:6px;padding:10px 14px 14px}
        .scaffold-btn{background:#fafafe;border:2px solid var(--border);padding:10px 14px;border-radius:10px;font-size:.88rem;color:var(--text);text-align:left;cursor:pointer;transition:all .2s;line-height:1.4}
        .scaffold-btn:hover{border-color:var(--accent);background:#f5f3ff}
        .scaffold-btn.correct{border-color:var(--success);background:#f0fdf4;color:var(--success);font-weight:600}
        .scaffold-btn.wrong{border-color:var(--danger);background:#fef2f2;color:var(--danger);opacity:.7}
        .scaffold-btn:disabled{cursor:not-allowed}

        /* === 诊断面板 === */
        .diag-panel{margin:12px 0;background:white;border:1px solid #e0e7ff;border-left:4px solid var(--accent);border-radius:var(--radius);padding:14px;animation:fadeIn .5s ease}
        .diag-title{font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px}
        .diag-body{font-size:.8rem;color:var(--text-sub);line-height:1.55}
        .diag-tag{display:inline-block;background:white;border:1px solid #c7d2fe;padding:2px 7px;border-radius:4px;font-size:.7rem;color:var(--accent);margin:3px 3px 0 0;font-weight:600}

        /* === 对话区分隔线（题目与对话之间） === */
        .chat-divider{margin:14px 0 8px;display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--text-muted);font-weight:600}
        .chat-divider::before,.chat-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
        .options-group{margin:10px 14px;display:flex;flex-direction:column;gap:7px;animation:fadeIn .4s ease}
        .opt-btn{background:white;border:2px solid var(--border);padding:12px 16px;border-radius:10px;font-size:.9rem;color:var(--text);text-align:left;cursor:pointer;transition:all .2s;line-height:1.4}
        .opt-btn:hover{border-color:var(--primary);background:var(--primary-light)}
        .opt-btn.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:600}
        .result-card{margin:14px;background:white;border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.08);animation:fadeIn .5s ease}
        .result-header{padding:14px 18px;font-weight:700;font-size:.95rem;color:white}
        .result-header.pass{background:linear-gradient(135deg,#10b981,#059669)}.result-header.retry{background:linear-gradient(135deg,#f59e0b,#d97706)}.result-header.fail{background:linear-gradient(135deg,#ef4444,#dc2626)}
        .result-body{padding:14px 18px}
        .result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:.85rem}
        .result-row:last-child{border:none}.result-label{color:var(--text-sub)}.result-value{font-weight:600}
        .next-btn{display:block;width:calc(100% - 28px);margin:10px 14px 20px;padding:14px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
        .next-btn:hover{background:#2563eb}.next-btn.accent{background:var(--accent)}.next-btn.accent:hover{background:#7c3aed}
        .kp-tag{display:inline-block;background:#f0fdf4;color:var(--ai-color);border:1px solid #bbf7d0;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;margin:2px}
        .kp-tag.unlock{background:#eff6ff;color:var(--primary);border-color:#bfdbfe}
        .ability-bar{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:.7rem}
        .ability-bar .ab-name{width:60px;color:var(--text-sub);text-align:right;flex-shrink:0}
        .ability-bar .ab-track{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
        .ability-bar .ab-fill{height:100%;border-radius:3px;transition:width .6s ease}
        .ab-fill.lv1{background:#f59e0b}.ab-fill.lv2{background:#3b82f6}.ab-fill.lv3{background:#10b981}
        .topic-card{background:white;margin:10px 14px;padding:16px;border-radius:var(--radius);border:2px solid var(--border);cursor:pointer;transition:all .2s}
        .topic-card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(59,130,246,.15);transform:translateY(-1px)}
        .tc-diff{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:6px}
        .tc-diff.easy{background:#f0fdf4;color:var(--success)}.tc-diff.medium{background:#fffbeb;color:var(--warning)}.tc-diff.hard{background:#fef2f2;color:var(--danger)}
        .tc-title{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:4px}
        .tc-desc{font-size:.8rem;color:var(--text-sub);line-height:1.5}
        .input-bar{flex-shrink:0;background:#f5f5f5;border-top:1px solid #d9d9d9;padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:100}
        .input-bar input{flex:1;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:.95rem;outline:none;transition:border-color .2s;background:white}
        .input-bar input:focus{border-color:#07c160}.input-bar input::placeholder{color:#b2b2b2}.input-bar input:disabled{background:#f1f5f9}
        .btn-submit{background:#07c160;color:white;border:none;width:44px;height:44px;border-radius:6px;font-size:1.1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .btn-submit:hover{background:#06ad56}.btn-submit:disabled{background:#ccc;cursor:not-allowed}
        .input-bar.hidden{display:none}
        .voice-indicator{display:flex;align-items:center;gap:6px;margin-right:6px}
        .voice-dot{width:6px;height:6px;border-radius:50%;background:var(--ai-color);animation:voicePulse 1.2s ease infinite}
        .voice-dot:nth-child(2){animation-delay:.2s}.voice-dot:nth-child(3){animation-delay:.4s}
        @keyframes voicePulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        .voice-label{font-size:.7rem;color:var(--ai-color);font-weight:500}
        .question-text .char{display:inline;opacity:0;animation:charIn .06s ease forwards}
        @keyframes charIn{to{opacity:1}}

        /* === 讲解梯子进度条 === */
        .ladder-progress{margin:12px 14px 4px;display:flex;align-items:center;gap:0}
        .ladder-node{display:flex;align-items:center;gap:0}
        .ladder-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;border:2px solid var(--border);background:white;color:var(--text-muted);transition:all .3s;position:relative}
        .ladder-dot.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
        .ladder-dot.done{border-color:var(--success);background:#f0fdf4;color:var(--success)}
        .ladder-dot.fail{border-color:var(--danger);background:#fef2f2;color:var(--danger)}
        .ladder-dot.skip{border-color:var(--warning);background:#fffbeb;color:var(--warning)}
        .ladder-line{width:24px;height:2px;background:var(--border);transition:background .3s}
        .ladder-line.done{background:var(--success)}
        .ladder-label{font-size:.6rem;color:var(--text-muted);position:absolute;top:32px;white-space:nowrap;left:50%;transform:translateX(-50%)}

    scrollChat(){setTimeout(()=>this.chatZone.scrollTo({top:this.chatZone.scrollHeight,behavior:'smooth'}),100);},

    // === 题干区 ===
    setQuestion(q,label){
        this.questionZone.innerHTML='';
        if(this.slideEl)this.slideEl.style.display='';
        const div=document.createElement('div');div.className='question-card';
        const gradeLabel=q.grade||'五年级';

        div.innerHTML=`<div class="question-header"><div class="qh-icon">📐</div><div class="qh-title">${titleName}</div><div class="qh-badge">${gradeLabel}</div></div>`;
        const textEl=document.createElement('div');textEl.className='question-text';
        div.appendChild(textEl);
        this.questionZone.appendChild(div);
        this._animateText(textEl,q.text);
    },
    _animateText(el,html){const parts=[];let i=0;while(i<html.length){if(html[i]==='<'){const end=html.indexOf('>',i);if(end>i){parts.push({type:'tag',val:html.slice(i,end+1)});i=end+1;}else{parts.push({type:'char',val:html[i]});i++;}}else{parts.push({type:'char',val:html[i]});i++;}}let buf='',ci=0;const step=()=>{if(ci>=parts.length){el.innerHTML=html;return;}const p=parts[ci];ci++;if(p.type==='tag'){buf+=p.val;el.innerHTML=buf;step();}else{buf+=p.val;el.innerHTML=buf;setTimeout(step,25);}};step();},
    clearQuestion(){this.questionZone.innerHTML='';if(this.slideEl)this.slideEl.style.display='none';},

    // === 板书区（V2：支持逐步亮出）===
    _boardVisualHtml:null, _boardHintText:null, _boardTitle:null, _boardSteps:[], _boardConclusion:null,

        this._boardTitle=title;this._boardSteps=[];this._boardConclusion=null;
        this._renderBoard();
    },
    addBoardStep(stepHtml){
        this._boardSteps.push(stepHtml);
        this._renderBoard();
    },
    setBoardConclusion(text){
        this._boardConclusion=text;
        this._renderBoard();
    },
    _renderBoard(){
        this.boardZone.innerHTML='';
        if(!this._boardTitle)return;
        let rightHtml=this._boardSteps.map((s,i)=>`<div class="board-step" style="animation-delay:${i*.3}s">${s}</div>`).join('');
        if(this._boardConclusion)rightHtml+=`<div class="board-divider"></div><div class="board-conclusion" style="animation-delay:${this._boardSteps.length*.3}s">${this._boardConclusion}</div>`;
        let leftHtml='';

    // === 对话区（不变） ===
    addMsg(role,text,extraClass){const div=document.createElement('div');div.className=`msg-row msg-${role}`;const av=role==='ai'?'🤖':'👦🏻',nm=role==='ai'?'AI 小白':'我';div.innerHTML=`${role==='ai'?`<div class="avatar">${av}</div>`:''}<div class="bubble-wrap"><div class="sender">${nm}</div><div class="bubble ${extraClass||''}">${text}</div></div>${role==='stu'?`<div class="avatar">${av}</div>`:''}`;this._sec().appendChild(div);this.scrollChat();},
    _sec(){let s=this.chatZone.querySelector('.chat-section:last-of-type');if(!s){s=document.createElement('div');s.className='chat-section';this.chatZone.appendChild(s);}return s;},
    newSection(){const s=document.createElement('div');s.className='chat-section';this.chatZone.appendChild(s);return s;},
    addDiagPanel(title,desc,tags){const div=document.createElement('div');div.className='diag-panel';div.innerHTML=`<div class="diag-title">🔍 ${title}</div><div class="diag-body">${desc}</div>${tags?'<div style="margin-top:6px">'+tags.map(t=>`<span class="diag-tag">${t}</span>`).join('')+'</div>':''}`;this.chatZone.appendChild(div);this.scrollChat();},
    showOptions(opts,cb){this.inputBar.classList.add('hidden');const div=document.createElement('div');div.className='options-group';opts.forEach(o=>{const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o.label;btn.onclick=()=>{div.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);btn.classList.add('selected');setTimeout(()=>cb(o.value),300);};div.appendChild(btn);});this.chatZone.appendChild(div);this.scrollChat();},
    showInputBar(ph){this.inputBar.classList.remove('hidden');this.answerInput.value='';this.answerInput.placeholder=ph||'说出你的想法...';this.answerInput.disabled=false;this.submitBtn.disabled=false;this.answerInput.focus();},
    hideInputBar(){this.inputBar.classList.add('hidden');},
    showResult(grade,rows){const div=document.createElement('div');div.className='result-card';const cls=grade==='pass'?'pass':grade==='retry'?'retry':'fail';const title=grade==='pass'?'🎉 掌握!':grade==='retry'?'💪 加油':'📖 需巩固';div.innerHTML=`<div class="result-header ${cls}">${title}</div><div class="result-body">${rows.map(r=>`<div class="result-row"><span class="result-label">${r[0]}</span><span class="result-value">${r[1]}</span></div>`).join('')}</div>`;this.chatZone.appendChild(div);this.scrollChat();},
    showNextBtn(text,cb,accent){const btn=document.createElement('button');btn.className=`next-btn ${accent?'accent':''}`;btn.textContent=text;btn.onclick=()=>{btn.remove();cb();};this.chatZone.appendChild(btn);this.scrollChat();},
    showAbilityCard(abilities){const div=document.createElement('div');div.style.cssText='padding:0 14px 10px';let bars='';Object.entries(abilities).forEach(([n,v])=>{const p=Math.round(v*100),lv=p>=70?'lv3':p>=40?'lv2':'lv1';bars+=`<div class="ability-bar"><span class="ab-name">${n.replace('能力','')}</span><div class="ab-track"><div class="ab-fill ${lv}" style="width:${p}%"></div></div><span style="font-size:.65rem;color:var(--text-muted);width:30px">${p}%</span></div>`;});div.innerHTML=`<div style="font-size:.8rem;color:var(--text-sub);margin:8px 0 6px;font-weight:600">🎯 能力评估</div>${bars}`;this.chatZone.appendChild(div);this.scrollChat();},
    showRecommendations(pPct,dagUnlock){const div=document.createElement('div');div.style.padding='0 14px 20px';div.innerHTML='<div style="font-size:.8rem;color:var(--text-sub);margin:14px 0 8px;font-weight:600">📚 推荐下一步</div>';if(pPct>=70)div.innerHTML+=(dagUnlock||[]).map(t=>`<div class="kp-tag unlock">${t}</div>`).join('')+'<div style="font-size:.8rem;color:var(--text-sub);margin-top:8px">已掌握，可挑战更复杂变式！</div>';else if(pPct>=40)div.innerHTML+='<div class="kp-tag">再练变式</div>';else div.innerHTML+='<div class="kp-tag" style="border-color:#fecaca;background:#fef2f2;color:var(--danger)">基础复习</div>';this.chatZone.appendChild(div);},
    updateProgress(step){document.querySelectorAll('.dot').forEach((d,i)=>{d.className='dot'+(i<step?' done':i===step?' active':'');});},
    showTopicSelector(){
        this.clearQuestion();this.clearBoard();this.chatZone.innerHTML='';
        this.renderStageBar(null);
        const h=document.createElement('div');h.style.cssText='padding:16px 14px 8px;font-size:.85rem;font-weight:700;color:var(--text)';h.textContent='📋 选择练习题目';this.chatZone.appendChild(h);
        const desc=document.createElement('div');desc.style.cssText='padding:0 14px 8px;font-size:.8rem;color:var(--text-sub)';desc.textContent='五年级数学 · 点击关卡开始练习';this.chatZone.appendChild(desc);
        MAIN_QUESTIONS.forEach(qId=>{const info=TOPIC_INFO[qId];if(!info)return;const card=document.createElement('div');card.className='topic-card';card.innerHTML=`<span class="tc-diff ${info.diff}">${info.diffLabel}</span><div class="tc-title">${info.icon||'📐'} ${info.name}</div><div class="tc-desc">${info.desc}</div>`;card.onclick=()=>Engine.selectTopic(qId);this.chatZone.appendChild(card);});
    },
    // === 关卡进度条 ===
    _stageCompleted:{},
    renderStageBar(activeId){
        const bar=document.getElementById('stageBar');if(!bar)return;
        let html='';
        const completed=this._stageCompleted;
        const doneCount=Object.keys(completed).length;
        const total=MAIN_QUESTIONS.length;
        MAIN_QUESTIONS.forEach((qId,i)=>{
            const info=TOPIC_INFO[qId];if(!info)return;
            const isDone=!!completed[qId];
            const isActive=qId===activeId;
            const cls=isActive?'active':isDone?'done':'';
            html+=`<div class="stage-item">`;
            html+=`<button class="stage-btn ${cls}" onclick="Engine.selectTopic('${qId}')" title="${info.desc}">`;
            html+=`<span class="stage-icon">${info.icon||'📋'}</span>`;
            html+=`<span>${info.name}</span>`;
            if(isDone)html+=`<span class="stage-check"> ✓</span>`;
            html+=`</button></div>`;
            if(i<MAIN_QUESTIONS.length-1)html+=`<div class="stage-connector ${isDone?'done':''}"></div>`;
        });
        html+=`<div class="stage-lesson-progress"><span class="slp-label">${doneCount}/${total}</span><div class="slp-bar"><div class="slp-fill" style="width:${total?Math.round(doneCount/total*100):0}%"></div></div></div>`;
        bar.innerHTML=html;
    },
    markStageComplete(qId){this._stageCompleted[qId]=true;},
    clearAll(){this.clearQuestion();this.clearBoard();this.chatZone.innerHTML='';this.hideInputBar();}
};

const Backend={
    updateJSON(obj){const el=document.getElementById('jsonView');if(!el)return;const s=JSON.stringify(obj,null,2);el.innerHTML=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:').replace(/: "([^"]*)"/g,': <span class="json-string">"$1"</span>').replace(/: (\d+\.?\d*)/g,': <span class="json-number">$1</span>').replace(/: (true|false)/g,': <span class="json-boolean">$1</span>').replace(/: null/g,': <span class="json-null">null</span>').replace(/\n/g,'<br>').replace(/  /g,'&nbsp;&nbsp;');},
    updateTags(tags){if(tags.phase){const t=document.getElementById('tagPhase');t.textContent=`Phase: ${tags.phase}`;this._pulse(t);}if(tags.solo){const t=document.getElementById('tagSolo');t.textContent=tags.solo;this._pulse(t);}if(tags.triple){const t=document.getElementById('tagTriple');t.textContent=tags.triple;this._pulse(t);}},
    updateStrategy(title,desc){document.getElementById('strategyTitle').textContent=title;document.getElementById('strategyDesc').textContent=desc;const c=document.getElementById('strategyCard');c.classList.remove('updated');void c.offsetWidth;c.classList.add('updated');},
    addTimeline(type,text){const tl=document.getElementById('timeline');const item=document.createElement('div');item.className='tl-item';item.innerHTML=`<div class="tl-dot ${type}"></div><div class="tl-text">${text}</div>`;tl.appendChild(item);tl.scrollTop=tl.scrollHeight;},
    updateKG(q){const sec=document.getElementById('kgSection');if(!DataLayer.ready||!q.knowledge?.L4){sec.style.display='none';return;}const ctx=DataLayer.getKnowledgeContext(q.knowledge.L4);if(!ctx){sec.style.display='none';return;}sec.style.display='';document.getElementById('kgBreadcrumb').innerHTML=[ctx.l1?`<span class="kg-crumb l1">${ctx.l1}</span><span class="kg-arrow">›</span>`:'',ctx.l2?`<span class="kg-crumb l2">${ctx.l2}</span><span class="kg-arrow">›</span>`:'',ctx.l3?`<span class="kg-crumb l3">${ctx.l3}</span><span class="kg-arrow">›</span>`:'',`<span class="kg-crumb l4">${ctx.l4}</span>`].join('');let html='';if(ctx.preDeps.length)html+=`<div class="kg-dep-label">⬆ 前置</div><div class="kg-dep-list">${ctx.preDeps.map(d=>`<span class="kg-dep-tag pre">${d}</span>`).join('')}</div>`;if(ctx.postDeps.length)html+=`<div class="kg-dep-label" style="margin-top:4px">⬇ 后继</div><div class="kg-dep-list">${ctx.postDeps.slice(0,5).map(d=>`<span class="kg-dep-tag post">${d}</span>`).join('')}</div>`;document.getElementById('kgDeps').innerHTML=html;},
    updateIdeas(ideas){const sec=document.getElementById('ideaSection');if(!ideas?.length){sec.style.display='none';return;}sec.style.display='';document.getElementById('ideaChips').innerHTML=ideas.map(i=>{const info=DataLayer.getIdeaInfo(i);return info?`<span class="idea-chip"><span class="idea-id">${i.match(/ID-\d+/)?.[0]||''}</span>${info.name}</span>`:`<span class="idea-chip">${i}</span>`;}).join('');const ct=ideas.map(i=>{const info=DataLayer.getIdeaInfo(i);return info?`${info.name}：${info.cross}`:null;}).filter(Boolean);document.getElementById('ideaCross').innerHTML=ct.length?ct.join('<br>'):'';},
    _pulse(el){el.classList.remove('updated');void el.offsetWidth;el.classList.add('updated');}
};

// ========================================================
// V2 诊断引擎：错因驱动 + 讲解梯子
// ========================================================
const Engine={
    state:{phase:'main',flowId:null,currentQ:null,ladderIdx:0,ladderStartIdx:0,ladderStates:[],ladderRetries:0,mainCorrect:false,errorPattern:null,mastery:{knowledge:.3,pattern:0},totalQuestions:0,correctCount:0},
    delay(ms){return new Promise(r=>setTimeout(r,ms));},

    selectTopic(flowId){
        this.state={phase:'main',flowId,currentQ:null,ladderIdx:0,ladderStartIdx:0,ladderStates:[],ladderRetries:0,mainCorrect:false,errorPattern:null,mastery:{knowledge:.3,pattern:0},totalQuestions:0,correctCount:0};
        document.getElementById('timeline').innerHTML='<h3>📋 诊断时间线</h3>';
        const mq=QUESTION_BANK[flowId];
        UI.renderStageBar(flowId);
        Backend.updateJSON({Status:"等待作答...",Knowledge:mq.knowledge||{},FourDim:DataLayer.describeFourDim(mq.fourDim)});
        Backend.updateStrategy("💡 静默观测",`考法 ${mq.pattern||''}。思想 ${(mq.ideas||[]).join('+')}`);
        Backend.updateKG(mq);Backend.updateIdeas(mq.ideas);
        this.startMain(flowId);
    },

    async startMain(flowId){
        const flow=DIAGNOSIS_FLOWS[flowId],q=QUESTION_BANK[flow.mainId],s=this.state;
        s.phase='main';s.currentQ=q;
        UI.updateProgress(0);UI.setQuestion(q,'📐 真题挑战');UI.clearBoard();UI.chatZone.innerHTML='';UI.newSection();
        Backend.addTimeline('wait','<b>开始</b>');
        await this.delay(600);UI.addMsg('ai','同学你好！我是 AI 小白 🐬 仔细读题，算出答案告诉我~');
        UI.showInputBar(`答案？（${q.unit}）`);
    },

    parseAnswer(raw){const n=raw.match(/-?\d+\.?\d*/g);return n?parseFloat(n[n.length-1]):NaN;},

    // ★ misconception 检测：扫描当前步骤的误解触发词
    _checkMisconception(step, raw){
        if(!step.misconceptions?.length)return null;
        const t=raw.replace(/\s/g,'').toLowerCase();
        for(const mc of step.misconceptions){
            if((mc.trigger||[]).some(k=>t.includes(k.toLowerCase()))){
                return mc;
            }
        }
        return null;
    },

    handleSubmit(){
        const raw=UI.answerInput.value.trim();if(!raw)return;
        UI.answerInput.disabled=true;UI.submitBtn.disabled=true;
        UI.addMsg('stu',raw);UI.hideInputBar();
        const s=this.state;
        // 梯子中的提交
        if(s.phase==='ladder'){this.processLadderInput(raw);return;}
        const val=this.parseAnswer(raw);
        s.totalQuestions++;
        if(isNaN(val)){this.handleFreeText(raw);return;}
        switch(s.phase){
            case'main':this.processMain(val);break;
            case'consolidate':this.processConsolidate(val);break;
            case'levelUp':this.processLevelUp(val);break;
        }
    },

    classifyIntent(text){const t=text.replace(/\s/g,'');if(/不会|不知道|不懂|帮我|提示|看不懂|没思路|怎么做|怎么算/.test(t))return'need_help';if(/为什么|为啥|原理|什么意思/.test(t))return'ask_why';if(/算什么|求什么|做什么|干什么|这是/.test(t))return'confused_what';if(/^(好|ok|嗯|对|是的|明白了|懂了|好的)$/i.test(t))return'acknowledge';if(/^(不|没|不是|不对)$/i.test(t))return'deny';if(/是不是|应该是|我觉得|我猜/.test(t))return'guess';if(/先|然后|乘|除|×|÷|=/.test(t))return'show_work';return'unknown';},

    async handleFreeText(text){
        await this.delay(400);const intent=this.classifyIntent(text);
        Backend.addTimeline('info',`<b>意图</b>: ${intent}`);
        const s=this.state;
        // 如果在main阶段说"不会"，直接进入梯子讲解（从头开始）
        if(s.phase==='main'&&(intent==='need_help'||intent==='confused_what')){
            s.totalQuestions++;
            UI.addMsg('ai','没关系！我来一步步带你 💡');
            s.errorPattern={type:"主动求助",diagTags:["主动求助"]};
            Backend.addTimeline('info','<b>主动求助</b> → 从S1开始讲解梯子');
            await this.delay(600);
            this.startLadder(0);
            return;
        }
        switch(intent){
            case'need_help':UI.addMsg('ai','没关系！一步步来 💡');await this.delay(400);UI.showInputBar('你来试试...');break;
            case'ask_why':UI.addMsg('ai','想深入理解，赞！✨');await this.delay(600);{const ideas=(this.state.flowId?QUESTION_BANK[DIAGNOSIS_FLOWS[this.state.flowId].mainId]:this.state.currentQ).ideas||[];if(ideas.length){const txt=ideas.map(i=>{const info=DataLayer.getIdeaInfo(i);return info?`<b>${info.name}</b>（${info.cross}）`:i;}).join('<br>');await this.delay(600);UI.addMsg('ai',`数学思想：<br>${txt}`,'hint');}}await this.delay(800);UI.addMsg('ai','理解了就算一下？');await this.delay(400);UI.showInputBar('算~');break;
            case'acknowledge':UI.addMsg('ai','好！算出答案告诉我~');await this.delay(400);UI.showInputBar('答案...');break;
            case'guess':UI.addMsg('ai','<b>猜</b>不如<b>算</b>~ 代入公式！','hint');await this.delay(400);UI.showInputBar('具体数字...');break;
            case'show_work':UI.addMsg('ai','思路对 👍 最终数字告诉我~');await this.delay(400);UI.showInputBar('最终答案...');break;
            default:UI.addMsg('ai','需要帮忙还是自己算？','hint');UI.showOptions([{label:'📝 帮我讲',value:'teach'},{label:'🧮 我自己算',value:'calc'}],c=>{if(c==='teach'){if(s.phase==='main'){s.errorPattern={type:"主动求助",diagTags:["主动求助"]};this.startLadder(0);}else UI.showInputBar('试试~');}else UI.showInputBar('你来...');});break;
        }
    },

    // ★★★ V2 核心：processMain → 错因驱动 → 梯子讲解 ★★★
    async processMain(val){
        const s=this.state,q=s.currentQ,flow=DIAGNOSIS_FLOWS[s.flowId];
        UI.updateProgress(1);

        if(val===q.answer){
            // 答对
            s.mainCorrect=true;s.correctCount++;s.mastery.knowledge=.85;s.mastery.pattern=.7;
            Backend.addTimeline('pass',`<b>正确</b> ${val}${q.unit} ✓`);
            Backend.updateTags({phase:"✅ 通过",solo:"SOLO: EXTENDED ✓"});
            Backend.updateStrategy("💡 升维","一次通过");
            await this.delay(500);UI.addMsg('ai',q.correctFeedback||'🎉 正确！','success');
            // 展示完整板书
            await this.delay(600);
            if(q.teachingLadder){
                if(q.visual?.type==='cuboid')UI.showCuboidVisual(q.visual);
                else if(q.visual?.type==='tank')UI.showTankVisual(q.visual.labels);
                UI.initBoard(q.title);
                q.teachingLadder.forEach(s=>UI.addBoardStep(s.boardStep));
                UI.setBoardConclusion(flow.boardConclusion);
            }
            await this.delay(800);UI.addDiagPanel('结论','核心知识点已掌握。',q.correctDiagTags||[]);
            if(flow.levelUpId){
                await this.delay(600);UI.addMsg('ai','挑战升维题？💪');
                UI.showOptions([{label:'🚀 升维！',value:'levelUp'},{label:'✅ 看结果',value:'done'},{label:'🔄 换题',value:'back'}],c=>{if(c==='levelUp')this.startLevelUp();else if(c==='back')this.goBack();else this.showFinalResult();});
            }else this.showFinalResult();
        }else{
            // ★ 答错：错因驱动诊断 ★
            s.mainCorrect=false;
            const ep=(q.errorPatterns||{})[val];
            s.errorPattern=ep||{type:"计算偏差",failDim:null,targetStep:0,diagTags:[]};
            const epType=s.errorPattern.type;
            const failDim=s.errorPattern.failDim;
            const targetStep=s.errorPattern.targetStep||0;

            Backend.addTimeline('fail',`<b>错误</b> ${val}，${epType}`);
            Backend.updateTags({phase:"❌ 错因定位"});

            // 更新监控台JSON：展示错因驱动决策
            Backend.updateJSON({
                StudentAnswer:val,CorrectAnswer:q.answer,
                ErrorPattern:epType,FailDim:failDim||"未匹配",
                TargetStep:targetStep,
                Strategy:ep?"错因驱动→精准定位":"默认→从S1开始",
                Ladder:q.teachingLadder?.map(s=>s.name)||[]
            });

            await this.delay(500);
            if(ep?.feedback){
                UI.addMsg('ai',ep.feedback,'error-hint');
            }else{
                UI.addMsg('ai',`<b>${val}</b> ${q.defaultFeedback||'不太对。'}`,'error-hint');
            }

            await this.delay(800);

            // 展示错因定位面板
            if(ep&&failDim){
                const ladder=q.teachingLadder||[];
                const stepName=ladder[targetStep]?.name||`步骤${targetStep+1}`;
                UI.showErrorLocate(epType,failDim,stepName);
                Backend.addTimeline('info',`<b>定位</b> failDim=${failDim} → 从「${stepName}」开始`);
                Backend.updateStrategy("🎯 错因驱动",`${epType} → ${failDim} → ${stepName}`);
            }else{
                Backend.addTimeline('info','<b>未匹配errorPattern</b> → 从S1开始');
                Backend.updateStrategy("🔍 全链路引导","无精确匹配，从头引导");
            }

            await this.delay(800);
            // 视觉引导（如果有）
            if(q.visual?.type==='tank'){
                UI.showTankVisual(q.visual.labels);
                const flow2=DIAGNOSIS_FLOWS[s.flowId];
                if(flow2.visualGuideText)UI.setBoardHint(flow2.visualGuideText);
            }else if(q.visual?.type==='cuboid'){
                UI.showCuboidVisual(q.visual);
                const flow2=DIAGNOSIS_FLOWS[s.flowId];
                if(flow2.visualGuideText)UI.setBoardHint(flow2.visualGuideText);
            }

            UI.showNextBtn('📝 一步步来',()=>this.startLadder(ep?targetStep:0));
        }
    },

    // ★★★ 讲解梯子引擎 ★★★
    async startLadder(startIdx, overrideQ){
        const s=this.state, q=overrideQ||QUESTION_BANK[DIAGNOSIS_FLOWS[s.flowId].mainId];
        s._ladderQ=q; // 记住当前梯子对应的题目
        const ladder=q.teachingLadder;
        if(!ladder||!ladder.length){this.showFinalResult();return;}

        s.phase='ladder';
        s.ladderStartIdx=startIdx;
        s.ladderIdx=startIdx;
        s.ladderRetries=0;
        s.ladderStates=ladder.map((_,i)=>i<startIdx?'skip':'pending');
        s.ladderStates[startIdx]='active';

        UI.updateProgress(2);
        Backend.updateTags({phase:`🪜 讲解 ${startIdx+1}/${ladder.length}`});

        // 初始化板书（空，逐步填）
        UI.initBoard(q.title);
        // 把跳过的步骤快速亮出
        for(let i=0;i<startIdx;i++){
            UI.addBoardStep(ladder[i].boardStep);
        }

        UI.showLadderProgress(ladder,startIdx,s.ladderStates);
        await this.delay(500);
        this.askLadderStep();
    },

    async askLadderStep(){
        const s=this.state, q=s._ladderQ||QUESTION_BANK[DIAGNOSIS_FLOWS[s.flowId].mainId];
        const ladder=q.teachingLadder;
        const step=ladder[s.ladderIdx];
        if(!step){this.finishLadder();return;}

        Backend.addTimeline('info',`<b>梯子 ${s.ladderIdx+1}</b> ${step.name}`);
        Backend.updateTags({phase:`🪜 ${step.name} (${s.ladderIdx+1}/${ladder.length})`});
        Backend.updateStrategy(`🪜 步骤 ${s.ladderIdx+1}: ${step.name}`,`验证维度: ${step.dim}`);

        await this.delay(400);
        UI.addMsg('ai',step.aiAsk);

        // 根据验证方式决定输入方式
        if(step.verify==='number'){
            UI.showInputBar('算一算...');
        }else{
            // 关键词匹配模式，使用输入框
            UI.showInputBar('说出你的想法...');
        }
    },

    async processLadderInput(raw){
        const s=this.state, q=s._ladderQ||QUESTION_BANK[DIAGNOSIS_FLOWS[s.flowId].mainId];
        const ladder=q.teachingLadder;
        const step=ladder[s.ladderIdx];
        if(!step)return;

        let correct=false;
        if(step.verify==='number'){
            const val=this.parseAnswer(raw);
            correct=(!isNaN(val)&&val===step.verifyAnswer);
        }else if(step.verify==='input'){
            // 精确匹配多种接受格式
            const normalized=raw.replace(/\s+/g,'').toLowerCase();
            correct=(step.verifyAccept||[]).some(a=>normalized.includes(a.replace(/\s+/g,'').toLowerCase()));
            if(!correct&&step.verifyAnswer){
                correct=normalized.includes(String(step.verifyAnswer).replace(/\s+/g,'').toLowerCase());
            }
        }else{
            // 关键词匹配
            const t=raw.replace(/\s/g,'').toLowerCase();
            correct=(step.acceptKeywords||[]).some(k=>t.includes(k.toLowerCase()));
        }

        if(correct){
            // ✅ 这一步通过
            s.ladderStates[s.ladderIdx]='done';
            UI.showLadderProgress(ladder,s.ladderIdx,s.ladderStates);
            Backend.addTimeline('pass',`<b>${step.name} ✓</b>`);
            s.mastery.knowledge=Math.min(s.mastery.knowledge+.15,.85);

            await this.delay(300);
            UI.addMsg('ai',step.correctResponse,'success');
            // 板书亮出这一步
            UI.addBoardStep(step.boardStep);
            if(step.boardHint)UI.setBoardHint(step.boardHint);

            s.ladderRetries=0;
            s.ladderIdx++;

            if(s.ladderIdx>=ladder.length){
                await this.delay(600);this.finishLadder();
            }else{
                s.ladderStates[s.ladderIdx]='active';
                UI.showLadderProgress(ladder,s.ladderIdx,s.ladderStates);
                await this.delay(500);this.askLadderStep();
            }
        }else{
            // ★ 先检查是否命中misconception（不计入错误次数）
            const mc=this._checkMisconception(step, raw);
            if(mc){
                Backend.addTimeline('info',`<b>💡 误解识别</b> ${mc.type}`);
                Backend.updateStrategy("💡 误解纠正",mc.type);
                await this.delay(300);
                UI.showMisconception(mc);
                if(mc.boardHint)UI.setBoardHint(mc.boardHint);
                await this.delay(800);
                UI.addMsg('ai','理解了吗？再试一次~ 💪');
                await this.delay(400);
                UI.showInputBar('再想想...');
                return; // 不计入retries，给学生重新回答的机会
            }
            // ❌ 这一步未通过（非misconception）
            s.ladderRetries++;
            Backend.addTimeline('fail',`<b>${step.name} ✗</b> (第${s.ladderRetries}次)`);

            if(s.ladderRetries>=2){
                // 持续困难 → 直接告知答案，继续下一步
                s.ladderStates[s.ladderIdx]='fail';
                UI.showLadderProgress(ladder,s.ladderIdx,s.ladderStates);
                await this.delay(300);
                UI.addMsg('ai',step.tellAnswer,'hint');
                UI.addBoardStep(step.boardStep);
                if(step.boardHint)UI.setBoardHint(step.boardHint);
                s.mastery.knowledge=Math.max(s.mastery.knowledge-.1,.1);

                s.ladderRetries=0;
                s.ladderIdx++;
                if(s.ladderIdx>=ladder.length){
                    await this.delay(600);this.finishLadder();
                }else{
                    s.ladderStates[s.ladderIdx]='active';
                    UI.showLadderProgress(ladder,s.ladderIdx,s.ladderStates);
                    await this.delay(600);
                    UI.addMsg('ai','没关系，继续下一步！');
                    await this.delay(400);this.askLadderStep();
                }
            }else{
                // 第一次错 → 给提示再试，并提供回退选项
                await this.delay(300);
                UI.addMsg('ai',step.hintOnWrong,'hint');
                await this.delay(400);
                if(s.ladderIdx>0){
                    // 提供回退选项
                    UI.showOptions([
                        {label:'💡 我再想想',value:'retry'},
                        {label:'🔙 前面的没懂，回退一步',value:'goback'}
                    ],c=>{
                        if(c==='goback'){
                            // 回退到上一步
                            s.ladderStates[s.ladderIdx]='pending';
                            s.ladderIdx--;
                            s.ladderStates[s.ladderIdx]='active';
                            s.ladderRetries=0;
                            // 移除板书最后一步
                            UI._boardSteps.pop();
                            UI._renderBoard();
                            UI.showLadderProgress(ladder,s.ladderIdx,s.ladderStates);
                            Backend.addTimeline('info',`<b>🔙 回退</b> → ${ladder[s.ladderIdx].name}`);
                            UI.addMsg('ai',`好，我们回到「<b>${ladder[s.ladderIdx].name}</b>」再讲一遍 💪`);
                            this.delay(500).then(()=>this.askLadderStep());
                        }else{
                            UI.showInputBar('再想想...');
                        }
                    });
                }else{
                    UI.showInputBar('再想想...');
                }
            }
        }
    },

    async finishLadder(){
        const s=this.state, flow=DIAGNOSIS_FLOWS[s.flowId];
        const q=s._ladderQ||QUESTION_BANK[flow.mainId];
        const returnPhase=s._ladderReturnPhase||null; // 记住梯子结束后回到哪个阶段
        UI.removeLadderProgress();
        if(!returnPhase)UI.setBoardConclusion(flow.boardConclusion);

        // 统计梯子表现
        const doneCount=s.ladderStates.filter(x=>x==='done').length;
        const failCount=s.ladderStates.filter(x=>x==='fail').length;
        const skipCount=s.ladderStates.filter(x=>x==='skip').length;
        const total=s.ladderStates.length;

        Backend.addTimeline('info',`<b>梯子完成</b> ✓${doneCount} ✗${failCount} ⏭${skipCount}`);

        // 诊断面板
        let diagDesc='';
        if(failCount===0&&skipCount===0)diagDesc='全部步骤独立完成！';
        else if(failCount===0)diagDesc=`跳过了前 ${skipCount} 步（已掌握），后续全部完成。`;
        else diagDesc=`${failCount}步需要辅助讲解。薄弱环节：${s.ladderStates.map((st,i)=>st==='fail'?q.teachingLadder[i].name:null).filter(Boolean).join('、')}`;

        const diagTags=s.ladderStates.map((st,i)=>{
            const name=q.teachingLadder[i].name;
            if(st==='done')return`${name} ✓`;
            if(st==='fail')return`${name} ✗`;
            if(st==='skip')return`${name} ⏭`;
            return null;
        }).filter(Boolean);

        UI.addDiagPanel('讲解梯子结果',diagDesc,diagTags);

        // 调整 mastery
        s.mastery.pattern=doneCount/(total-skipCount||1)*.6;

        await this.delay(800);

        // 从巩固/升维题的梯子返回
        if(returnPhase==='consolidate'){
            s.phase='consolidate';s._ladderReturnPhase=null;
            if(doneCount>failCount&&flow.levelUpId){
                UI.addMsg('ai','讲解完毕！要不要挑战升维题？😏');
                UI.showOptions([{label:'🚀 升维！',value:'levelUp'},{label:'✅ 看结果',value:'done'}],c=>{if(c==='levelUp')this.startLevelUp();else this.showFinalResult();});
            }else{
                UI.addMsg('ai','讲解完毕，来看看整体表现吧');
                UI.showNextBtn('看结果',()=>this.showFinalResult());
            }
            return;
        }
        if(returnPhase==='levelUp'){
            s.phase='levelUp';s._ladderReturnPhase=null;
            UI.addMsg('ai','讲解完毕，来看看整体表现吧');
            UI.showNextBtn('看报告',()=>this.showFinalResult());
            return;
        }

        if(doneCount>failCount&&flow.consolidateId){
            UI.addMsg('ai','理解了！来做一道巩固题验证一下 💪');
            UI.showNextBtn('💪 巩固练习',()=>this.startConsolidate());
        }else if(flow.consolidateId){
            UI.addMsg('ai','再练一道巩固一下？');
            UI.showOptions([{label:'💪 巩固练习',value:'consolidate'},{label:'✅ 看结果',value:'done'}],c=>{if(c==='consolidate')this.startConsolidate();else this.showFinalResult();});
        }else{
            this.showFinalResult();
        }
    },

    // === 巩固 / 升维 / 结果（基本不变）===
    async startConsolidate(){
        const s=this.state,flow=DIAGNOSIS_FLOWS[s.flowId],q=QUESTION_BANK[flow.consolidateId];
        s.phase='consolidate';s.currentQ=q;UI.updateProgress(2);
        Backend.addTimeline('info','<b>巩固</b>');Backend.updateTags({phase:"🏋️ 巩固"});
        UI.setQuestion(q,'🏋️ 巩固练习');UI.clearBoard();
        await this.delay(400);UI.addMsg('ai',flow.consolidatePrompt||'巩固~');UI.showInputBar(`答案？（${q.unit}）`);
    },
    async processConsolidate(val){
        const s=this.state,q=s.currentQ,flow=DIAGNOSIS_FLOWS[s.flowId];
        s.totalQuestions++;
        if(val===q.answer){
            s.correctCount++;s.mastery.pattern=Math.min(s.mastery.pattern+.35,.85);
            Backend.addTimeline('pass','<b>巩固 ✓</b>');await this.delay(500);UI.addMsg('ai',q.correctFeedback||'🎉 完美！','success');
            if(flow.levelUpId){await this.delay(800);UI.addMsg('ai','升维？😏');UI.showOptions([{label:'🚀 升维！',value:'levelUp'},{label:'✅ 结果',value:'done'},{label:'🔄 换题',value:'back'}],c=>{if(c==='levelUp')this.startLevelUp();else if(c==='back')this.goBack();else this.showFinalResult();});}
            else this.showFinalResult();
        }else{
            Backend.addTimeline('fail','<b>巩固 ✗</b>');s.mastery.pattern=Math.min(s.mastery.pattern+.15,.5);
            await this.delay(500);UI.addMsg('ai',`<b>${val}</b> 不对。`+(q.wrongHint||`答案 <b>${q.answer} ${q.unit}</b>`),'hint');
            if(q.teachingLadder&&q.teachingLadder.length){
                await this.delay(800);UI.addMsg('ai','没关系，我们一步步来 💪');
                UI.showNextBtn('📖 开始讲解',()=>{s._ladderReturnPhase='consolidate';this.startLadder(0,q);});
            }else{
                await this.delay(1000);UI.showNextBtn('看结果',()=>this.showFinalResult());
            }
        }
    },
    async startLevelUp(){
        const s=this.state,flow=DIAGNOSIS_FLOWS[s.flowId],q=QUESTION_BANK[flow.levelUpId];
        s.phase='levelUp';s.currentQ=q;UI.updateProgress(3);
        Backend.addTimeline('info','<b>升维</b>');Backend.updateTags({phase:"🚀 升维"});
        UI.setQuestion(q,'🚀 升维挑战');UI.clearBoard();
        await this.delay(400);UI.addMsg('ai',flow.levelUpPrompt||'挑战~');UI.showInputBar(`答案？（${q.unit}）`);
    },
    async processLevelUp(val){
        const s=this.state,q=s.currentQ;s.totalQuestions++;
        if(val===q.answer){s.correctCount++;s.mastery.pattern=Math.min(s.mastery.pattern+.25,.95);Backend.addTimeline('pass','<b>升维 ✓</b>');await this.delay(500);UI.addMsg('ai',q.correctFeedback||'🎉🎉 太强了！','success');}
        else{
            Backend.addTimeline('fail','<b>升维 ✗</b>');s.mastery.pattern=Math.min(s.mastery.pattern+.1,.7);await this.delay(500);UI.addMsg('ai',`<b>${val}</b> 不对。`+(q.wrongHint||`答案 <b>${q.answer} ${q.unit}</b>`),'hint');
            if(q.teachingLadder&&q.teachingLadder.length){
                await this.delay(800);UI.addMsg('ai','来，我们拆解一下 💪');
                UI.showNextBtn('📖 开始讲解',()=>{s._ladderReturnPhase='levelUp';this.startLadder(0,q);});
                return;
            }
        }
        await this.delay(800);UI.showNextBtn('看报告',()=>this.showFinalResult());
    },
    showFinalResult(){
        const s=this.state,flow=DIAGNOSIS_FLOWS[s.flowId],mq=QUESTION_BANK[flow.mainId];
        UI.updateProgress(3);UI.hideInputBar();UI.clearQuestion();UI.clearBoard();
        const kP=Math.round(s.mastery.knowledge*100),pP=Math.round(s.mastery.pattern*100);
        const grade=pP>=70?'pass':pP>=40?'retry':'fail';
        Backend.addTimeline(grade==='pass'?'pass':'fail',`<b>结束</b> ${kP}%/${pP}%`);
        Backend.updateJSON({End:true,Mastery:{knowledge:kP+'%',pattern:pP+'%'},LadderResult:s.ladderStates});
        const abilities=DataLayer.assessAbilities(mq,s.mastery);
        const rows=[['知识点',(mq.knowledge||{}).L4||mq.title],['考法',mq.pattern||''],['四维',DataLayer.describeFourDim(mq.fourDim).join(' · ')],['知识掌握',kP+'%'],['考法掌握',pP+'%'],['正确率',s.correctCount+'/'+s.totalQuestions]];
        if(s.errorPattern)rows.push(['错因',s.errorPattern.type]);
        // 梯子结果
        if(s.ladderStates.length){
            const doneC=s.ladderStates.filter(x=>x==='done').length;
            const failC=s.ladderStates.filter(x=>x==='fail').length;
            rows.push(['讲解梯子',`✓${doneC} ✗${failC} / ${s.ladderStates.length}步`]);
        }
        if(pP>=60&&flow.dagUnlock)rows.push(['解锁',flow.dagUnlock.join('、')]);
        UI.showResult(grade,rows);UI.showAbilityCard(abilities);UI.showRecommendations(pP,flow.dagUnlock);
        // 标记关卡完成 + 更新进度条
        UI.markStageComplete(s.flowId);UI.renderStageBar(s.flowId);
        // 找下一个未完成的关卡
        const nextQ=MAIN_QUESTIONS.find(qId=>qId!==s.flowId&&!UI._stageCompleted[qId]);
        if(nextQ){
            const ni=TOPIC_INFO[nextQ];
            UI.showNextBtn(`➡️ 下一关：${ni?.name||nextQ}`,()=>this.selectTopic(nextQ));
        }
        UI.showNextBtn('🔄 选择其他题目',()=>this.goBack());
    },
    goBack(){
        UI.clearAll();document.getElementById('timeline').innerHTML='<h3>📋 诊断时间线</h3>';
        document.getElementById('kgSection').style.display='none';document.getElementById('ideaSection').style.display='none';
        Backend.updateJSON({Status:"等待选择题目..."});Backend.updateTags({phase:"选题中"});Backend.updateStrategy("💡 等待选题","选择题目后启动");
        UI.showTopicSelector();
    }
};

// ========================================================
// 启动
// ========================================================
UI.init();
UI.answerInput.addEventListener('keydown',e=>{if(e.key==='Enter')Engine.handleSubmit();});
const _qOk=loadQuestions();if(_qOk)Backend.addTimeline('info',`<b>题库</b> ${Object.keys(QUESTION_BANK).length}道`);UI.showTopicSelector();
DataLayer.init().then(()=>{if(DataLayer.ready)Backend.addTimeline('info',`<b>知识图谱</b> ${Object.keys(DataLayer.kgMap).length}个L4`);});
</script>
